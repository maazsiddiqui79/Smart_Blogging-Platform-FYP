<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ error_code }} | Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f4f6f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      .error-box {
        text-align: center;
        background: #ffffff;
        padding: 3rem 2.5rem;
        border-radius: 12px;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .error-code {
        font-size: 4rem;
        font-weight: 700;
        color: #212529;
        letter-spacing: 2px;
      }

      .error-message {
        font-size: 1.05rem;
        color: #6c757d;
        margin: 1rem 0 2rem;
        line-height: 1.6;
      }

      .btn-home {
        padding: 0.6rem 1.6rem;
        font-weight: 500;
        border-radius: 6px;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #adb5bd;
      }
    </style>
  </head>

  <body>
    <div class="error-box">
      <div class="error-code">{{ error_code }}</div>

      <div class="error-message">
        {{ error_message }}
      </div>

      <a href="{% url 'home' %}" class="btn btn-dark btn-home">
        Return to Home
      </a>

      <footer>
        © {{ now|default:"" }} Your Application
      </footer>
    </div>
  </body>
</html>
